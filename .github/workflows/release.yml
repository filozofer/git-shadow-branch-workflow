name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        id: tarball
        run: |
          ARCHIVE="git-shadow-${{ steps.version.outputs.version }}.tar.gz"
          git archive \
            --format=tar.gz \
            --prefix="git-shadow-${{ steps.version.outputs.version }}/" \
            HEAD \
            > "$ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.tarball.outputs.sha256 }}"
          ARCHIVE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.tarball.outputs.archive }}"
          sed -i \
            -e "s|url \".*\"|url \"${ARCHIVE_URL}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            -e "s|version \".*\"|version \"${VERSION}\"|" \
            homebrew/git-shadow.rb

      - name: Commit updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/git-shadow.rb
          git commit -m "chore(homebrew): update formula to ${{ github.ref_name }}" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tarball.outputs.archive }}
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ## Homebrew

            ```bash
            brew tap filozofer/tap
            brew install git-shadow
            ```

            ## npm

            ```bash
            npm install -g git-shadow-cli
            ```

            ---
            **sha256:** `${{ steps.tarball.outputs.sha256 }}`
